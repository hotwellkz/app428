# Отключаем срабатывание сканера на Firebase API key (он публичный для клиента)
# https://ntl.fyi/configure-secrets-scanning
[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# Kaspi: синхронизация заказов 4 раза в день (09:00, 13:00, 17:00, 21:00 UTC)
[functions.kaspi-sync-scheduled]
  schedule = "0 9,13,17,21 * * *"

# Webhook Wazzup → Netlify function (должен быть выше правила /*)
[[redirects]]
  from = "/api/wazzup/webhook"
  to = "/.netlify/functions/wazzup-webhook"
  status = 200
  force = true

[[redirects]]
  from = "/api/send-whatsapp-message"
  to = "/.netlify/functions/send-whatsapp-message"
  status = 200
  force = true

[[redirects]]
  from = "/api/ai/analyze-client"
  to = "/.netlify/functions/ai-analyze-client"
  status = 200
  force = true

[[redirects]]
  from = "/api/ai/generate-reply"
  to = "/.netlify/functions/ai-generate-reply"
  status = 200
  force = true

[[redirects]]
  from = "/api/ai/transcribe-voice"
  to = "/.netlify/functions/ai-transcribe-voice"
  status = 200
  force = true

[[redirects]]
  from = "/api/ai/analyze-sales"
  to = "/.netlify/functions/ai-analyze-sales"
  status = 200
  force = true

[[redirects]]
  from = "/api/wazzup-integration"
  to = "/.netlify/functions/wazzup-integration"
  status = 200
  force = true

[[redirects]]
  from = "/api/wazzup-verify"
  to = "/.netlify/functions/wazzup-verify"
  status = 200
  force = true

# DELETE /api/templates/{id} — может давать 405 за прокси; клиент шлёт POST на /api/templates-delete
[[redirects]]
  from = "/api/templates/*"
  to = "/.netlify/functions/delete-quick-reply-template?id=:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/templates-delete"
  to = "/.netlify/functions/delete-quick-reply-template"
  status = 200
  force = true

# Поиск чатов: POST /api/chats-search — надёжнее за прокси (GET /api/chats/search даёт HTML)
[[redirects]]
  from = "/api/chats/search"
  to = "/.netlify/functions/chats-search"
  status = 200
  force = true

[[redirects]]
  from = "/api/chats-search"
  to = "/.netlify/functions/chats-search"
  status = 200
  force = true

[[redirects]]
  from = "/api/calculator/estimate"
  to = "/.netlify/functions/calculator-estimate"
  status = 200
  force = true

[[redirects]]
  from = "/api/kaspi-integration"
  to = "/.netlify/functions/kaspi-integration"
  status = 200
  force = true

[[redirects]]
  from = "/api/kaspi-verify"
  to = "/.netlify/functions/kaspi-verify"
  status = 200
  force = true

[[redirects]]
  from = "/api/kaspi-sync-orders"
  to = "/.netlify/functions/kaspi-sync-orders"
  status = 200
  force = true

[[redirects]]
  from = "/api/crm-ai-bot-test"
  to = "/.netlify/functions/crm-ai-bot-test"
  status = 200
  force = true

[[redirects]]
  from = "/api/crm-ai-bot-whatsapp-runtime"
  to = "/.netlify/functions/crm-ai-bot-whatsapp-runtime"
  status = 200
  force = true

[[redirects]]
  from = "/api/crm-ai-create-deal-from-recommendation"
  to = "/.netlify/functions/crm-ai-create-deal-from-recommendation"
  status = 200
  force = true

[[redirects]]
  from = "/api/crm-ai-create-task-from-recommendation"
